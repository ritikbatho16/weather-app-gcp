<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather</title>
    
    <!-- Link to Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-bg: #2196F3; /* Modern Blue */
            --secondary-bg: #E3F2FD; /* Light Blue */
            --text-color: #333;
            --card-bg: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--secondary-bg);
            background: linear-gradient(135deg, #71b7e6, #2196F3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Search Box Styles */
        .search-box {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 50px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .search-box input {
            flex: 1;
            padding: 10px 20px;
            border: none;
            outline: none;
            font-size: 1.1rem;
            background: transparent;
            color: var(--text-color);
        }

        .search-box input::placeholder {
            color: #888;
        }

        .search-box button {
            background-color: var(--primary-bg);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .search-box button:hover {
            background-color: #1976D2;
        }

        /* Error Message Style */
        .error-msg {
            background-color: #ffebee;
            color: #d32f2f;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ffcdd2;
        }

        /* Weather Card Styles */
        .weather-card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(5px);
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .weather-icon {
            font-size: 5rem;
            color: #fbc02d; /* Yellow for sunny */
            margin: 20px 0;
        }

        /* Icon colors based on description (handled in main.py but styled here) */
        .wi-cloud { color: #90a4ae; }
        .wi-rain { color: #42a5f5; }
        .wi-snow { color: #e1f5fe; }
        .wi-clear { color: #fbc02d; }

        .temp {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .desc {
            text-transform: capitalize;
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 25px;
        }

        /* Extra details like humidity and wind */
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        .detail-item i {
            font-size: 1.3rem;
            color: var(--primary-bg);
        }

    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- App Title (Optional, removed for cleaner look but can add back) -->
        <!-- <h1 style="color:white; margin-bottom:20px;">GCP Weather</h1> -->

        <!-- Search Form -->
        <form method="POST" class="search-box">
            <input type="text" name="city" placeholder="Sheher ka naam (jaise: Delhi)..." required>
            <button type="submit">Check</button>
        </form>

        <!-- Error Handling -->
        {% if error %}
        <div class="error-msg">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <!-- Weather Display Card (if data exists) -->
        {% if weather %}
        <div class="weather-card">
            <div class="city-name">
                <i class="fas fa-location-dot"></i> {{ city.upper() }}
            </div>
            
            <!-- Default Icon - Can be extended to be dynamic based on weather.weather[0].main -->
            <div class="weather-icon">
                {% if 'cloud' in weather.weather[0].description %}
                    <i class="fas fa-cloud wi-cloud">
